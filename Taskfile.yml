# https://taskfile.dev

version: "3"

vars:
  BACKEND_DIR: backend
  FRONTEND_DIR: frontend
  DIST_ROOT: dist
  DIST_DIR: dist/SplatReplay
  BUILD_DIR: backend/build
  BUILD_DIST_DIR: backend/dist/SplatReplay
  BACKEND_SPEC: packaging/splat-replay-webview.spec
  VENV_PYTHON: .venv/Scripts/python.exe
  VENV_PYINSTALLER: .venv/Scripts/pyinstaller.exe
  WEAPON_TEMPLATE_SYNC_SCRIPT: backend/scripts/sync_weapon_templates.py

tasks:
  # ========================================
  # インストール
  # ========================================
  install:
    desc: Install dependencies and recommended local setup (backend + frontend + hooks + LFS)
    cmds:
      - task: install:backend
      - task: install:frontend
      - task: install:hooks
        vars:
          SKIP_HOOKS: '{{default "" .SKIP_HOOKS}}'
        ignore_error: true
      - task: install:lfs
        vars:
          SKIP_LFS: '{{default "" .SKIP_LFS}}'
        ignore_error: true

  install:backend:
    desc: Install backend dependencies
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv sync

  install:frontend:
    desc: Install frontend dependencies
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - npm install

  install:hooks:
    desc: Install recommended Git hooks (pre-commit + pre-push)
    vars:
      SKIP_HOOKS_VALUE: '{{default "" .SKIP_HOOKS}}'
    cmds:
      - cmd: 'powershell -NoProfile -Command "if (''{{.SKIP_HOOKS_VALUE}}'' -eq ''1'') { Write-Host ''WARNING: SKIP_HOOKS=1 のため Git hooks 設定をスキップしました。必要になったら task.exe install:hooks を実行してください。'' -ForegroundColor Yellow; exit 0 }; uv --directory {{.BACKEND_DIR}} run pre-commit install --install-hooks --hook-type pre-commit --hook-type pre-push; if ((Get-Variable LASTEXITCODE -ValueOnly) -ne 0) { Write-Host ''WARNING: Git hooks の自動設定に失敗しました。必要になったら task.exe install:hooks を再実行してください。'' -ForegroundColor Yellow; exit (Get-Variable LASTEXITCODE -ValueOnly) }"'

  install:lfs:
    desc: Initialize Git LFS for replay-based workflow tests
    vars:
      SKIP_LFS_VALUE: '{{default "" .SKIP_LFS}}'
    cmds:
      - cmd: 'powershell -NoProfile -Command "if (''{{.SKIP_LFS_VALUE}}'' -eq ''1'') { Write-Host ''WARNING: SKIP_LFS=1 のため Git LFS 初期化をスキップしました。必要になったら task.exe install:lfs を実行してください。'' -ForegroundColor Yellow; exit 0 }; if (-not (Get-Command git -ErrorAction SilentlyContinue)) { Write-Host ''WARNING: git コマンドが見つからないため Git LFS 初期化をスキップしました。必要になったら task.exe install:lfs を実行してください。'' -ForegroundColor Yellow; exit 0 }; git lfs version; if ((Get-Variable LASTEXITCODE -ValueOnly) -ne 0) { Write-Host ''WARNING: Git LFS が未導入のため初期化をスキップしました。E2E を使う場合は Git LFS を導入した後で task.exe install:lfs を実行してください。'' -ForegroundColor Yellow; exit 0 }; git lfs install --skip-repo; if ((Get-Variable LASTEXITCODE -ValueOnly) -ne 0) { Write-Host ''WARNING: Git LFS の初期化に失敗しました。必要になったら task.exe install:lfs を再実行してください。'' -ForegroundColor Yellow; exit (Get-Variable LASTEXITCODE -ValueOnly) }"'

  # ========================================
  # OpenAPI 型生成
  # ========================================
  generate:openapi:
    desc: Generate OpenAPI schema from FastAPI
    dir: "{{.BACKEND_DIR}}"
    deps:
      - install:backend
    cmds:
      - cmd: powershell -NoProfile -Command "New-Item -ItemType Directory -Force -Path '../{{.FRONTEND_DIR}}/src/generated' | Out-Null"
        ignore_error: true
      - uv run python -c "import json; from splat_replay.bootstrap.web_app import create_app; app = create_app(); print(json.dumps(app.openapi(), indent=2))" > ../{{.FRONTEND_DIR}}/src/generated/openapi.json
    sources:
      - src/splat_replay/bootstrap/**/*.py
      - src/splat_replay/interface/web/**/*.py
    generates:
      - ../{{.FRONTEND_DIR}}/src/generated/openapi.json

  generate:types:
    desc: Generate TypeScript types from OpenAPI schema
    dir: "{{.FRONTEND_DIR}}"
    deps:
      - install:frontend
      - generate:openapi
    cmds:
      - npx openapi-typescript src/generated/openapi.json -o src/generated/api.d.ts
    sources:
      - src/generated/openapi.json
    generates:
      - src/generated/api.d.ts

  generate:
    desc: Generate all types and schemas
    cmds:
      - task: generate:openapi
      - task: generate:types

  # ========================================
  # ビルド
  # ========================================
  build:
    desc: Build complete application (frontend + backend + package)
    cmds:
      - task: clean:dist
      - task: clean:frontend:dist
      - task: build:frontend
      - task: build:backend
      - task: build:postprocess

  build:frontend:
    desc: Build frontend only
    dir: "{{.FRONTEND_DIR}}"
    deps:
      - install:frontend
    cmds:
      - npm run build
    sources:
      - src/**/*.ts
      - src/**/*.svelte
      - src/**/*.css
      - "*.html"
      - "*.config.*"
      - src/generated/**/*
    generates:
      - dist/**/*

  build:backend:
    desc: Build backend executable with PyInstaller
    dir: "{{.BACKEND_DIR}}"
    deps:
      - install:backend
    cmds:
      - uv sync --group build
      - "{{.VENV_PYINSTALLER}} {{.BACKEND_SPEC}} --clean"

  build:postprocess:
    desc: Post-process build artifacts (copy configs, assets, etc.)
    cmds:
      - task: build:copy-config
      - task: build:copy-assets
      - task: build:create-dirs
      - task: build:remove-restricted
      - task: build:create-build-warning
      - task: build:move-to-root
      - task: build:show-info

  build:move-to-root:
    desc: Move build artifacts from backend/dist to project root dist
    cmds:
      - cmd: powershell -NoProfile -Command "if (Test-Path '{{.BACKEND_DIR}}/dist/SplatReplay') { if (Test-Path '{{.DIST_ROOT}}') { Remove-Item -Recurse -Force '{{.DIST_ROOT}}' }; New-Item -ItemType Directory -Force -Path '{{.DIST_ROOT}}' | Out-Null; Move-Item -Force '{{.BACKEND_DIR}}/dist/SplatReplay' '{{.DIST_ROOT}}/'; Write-Host '✅ Moved build artifacts to {{.DIST_ROOT}}/SplatReplay' -ForegroundColor Green } else { Write-Host '❌ Build artifacts not found in {{.BACKEND_DIR}}/dist/SplatReplay' -ForegroundColor Red }"

  build:copy-config:
    desc: Copy selected config files to dist
    cmds:
      - cmd: powershell -NoProfile -Command "New-Item -ItemType Directory -Force -Path '{{.BUILD_DIST_DIR}}\config' | Out-Null"
        ignore_error: true
      - cmd: powershell -NoProfile -Command "if (Test-Path '{{.BACKEND_DIR}}\config\image_matching.yaml') { Copy-Item -Force '{{.BACKEND_DIR}}\config\image_matching.yaml' '{{.BUILD_DIST_DIR}}\config\image_matching.yaml' }"
        ignore_error: true
      - cmd: powershell -NoProfile -Command "if (Test-Path '{{.BACKEND_DIR}}\config\settings.example.toml') { Copy-Item -Force '{{.BACKEND_DIR}}\config\settings.example.toml' '{{.BUILD_DIST_DIR}}\config\settings.toml' }"
        ignore_error: true

  build:copy-assets:
    desc: Copy assets to dist (not in _internal)
    cmds:
      - cmd: powershell -NoProfile -Command "if (Test-Path '{{.BUILD_DIST_DIR}}\_internal\assets') { Remove-Item -Recurse -Force '{{.BUILD_DIST_DIR}}\_internal\assets' }"
        ignore_error: true
      - cmd: powershell -NoProfile -Command "if (Test-Path '{{.BACKEND_DIR}}\assets') { Copy-Item -Recurse -Force '{{.BACKEND_DIR}}\assets' '{{.BUILD_DIST_DIR}}\assets' }"

  build:create-dirs:
    desc: Create empty video directories in dist
    cmds:
      - cmd: powershell -NoProfile -Command "New-Item -ItemType Directory -Force -Path '{{.BUILD_DIST_DIR}}\videos\recorded' | Out-Null"
        ignore_error: true
      - cmd: powershell -NoProfile -Command "New-Item -ItemType Directory -Force -Path '{{.BUILD_DIST_DIR}}\videos\edited' | Out-Null"
        ignore_error: true

  build:remove-restricted:
    desc: Remove redistribution-prohibited files
    cmds:
      - cmd: powershell -NoProfile -Command "if (Test-Path '{{.BUILD_DIST_DIR}}\assets\thumbnail\ikamodoki1.ttf') { Remove-Item -Force '{{.BUILD_DIST_DIR}}\assets\thumbnail\ikamodoki1.ttf' }"
        ignore_error: true

  build:create-build-warning:
    desc: Create warning README in build folder
    cmds:
      - cmd: |
          powershell -NoProfile -Command "@'
          ========================================
            警告: このフォルダは中間生成物です
          ========================================

          このフォルダ (backend\build) には、PyInstaller のビルドプロセスで生成される
          中間ファイルが格納されています。

          このフォルダ内の .exe ファイルは不完全で、正常に動作しません。

          実行可能なアプリケーションは以下の場所にあります:

            dist\SplatReplay\SplatReplay.exe

          必ず上記のファイルを実行してください。

          ========================================
            WARNING: This folder contains intermediate build artifacts
          ========================================

          This folder (backend\build) contains intermediate files generated 
          by the PyInstaller build process.

          The .exe files in this folder are incomplete and will NOT work correctly.

          The runnable application is located at:

            dist\SplatReplay\SplatReplay.exe

          Always use the file above to run the application.
          '@ | Out-File -FilePath '{{.BUILD_DIR}}\README.txt' -Encoding UTF8"
        ignore_error: true

  build:show-info:
    desc: Show build information
    cmds:
      - cmd: 'powershell -NoProfile -Command "Write-Host ''''; Write-Host ''================================================='' -ForegroundColor Green; Write-Host ''  Build completed successfully!'' -ForegroundColor Green; Write-Host ''================================================='' -ForegroundColor Green; Write-Host ''''; Write-Host ''実行ファイルの場所:'' -ForegroundColor Cyan; Write-Host ''  {{.DIST_DIR}}\SplatReplay.exe'' -ForegroundColor Yellow; Write-Host ''''; Write-Host ''重要: このフォルダは配布用のパッケージです。'' -ForegroundColor Yellow; Write-Host ''      実行する場合は上記のファイルをダブルクリックしてください。'' -ForegroundColor Yellow; Write-Host ''''"'
      - cmd: 'powershell -NoProfile -Command "if (Test-Path ''{{.DIST_DIR}}\SplatReplay.exe'') { Write-Host (''実行ファイルサイズ: '' + [math]::Round((Get-Item ''{{.DIST_DIR}}\SplatReplay.exe'').Length / 1MB, 2) + '' MB'') -ForegroundColor Gray; Write-Host '''' }"'

  # ========================================
  # 開発サーバー
  # ========================================
  dev:
    desc: Start both frontend and backend dev servers
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run splat-replay web --dev

  dev:frontend:
    desc: Start frontend dev server
    dir: "{{.FRONTEND_DIR}}"
    interactive: true
    cmds:
      - npm run dev

  dev:backend:
    desc: Start backend dev server (uvicorn with reload)
    dir: "{{.BACKEND_DIR}}"
    interactive: true
    cmds:
      - uv run python -m uvicorn splat_replay.bootstrap.web_app:app --factory --host 127.0.0.1 --port 8000 --reload

  # ========================================
  # Lint / Format / Type Check
  # ========================================
  verify:
    desc: Run all checks (format, lint, type-check, import-lint, test)
    cmds:
      - task: format:check
      - task: lint
      - task: type-check
      - task: import-lint
      - task: test

  fix:
    desc: Auto-fix format and lint issues (backend + frontend)
    cmds:
      - task: lint:fix
      - task: format

  lint:
    desc: Lint all code (backend + frontend)
    cmds:
      - task: lint:backend
      - task: lint:frontend

  lint:fix:
    desc: Lint all code with auto-fix (backend + frontend)
    cmds:
      - task: lint:backend:fix
      - task: lint:frontend:fix

  lint:backend:
    desc: Lint backend code
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run ruff check .

  lint:backend:fix:
    desc: Lint backend code with auto-fix
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run ruff check . --fix

  lint:frontend:
    desc: Lint frontend code
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - npm run lint

  lint:frontend:fix:
    desc: Lint frontend code with auto-fix
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - npm run lint:fix

  import-lint:
    desc: Check import dependencies (layer violations)
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run lint-imports --no-cache

  format:
    desc: Format all code (backend + frontend)
    cmds:
      - task: format:backend
      - task: format:frontend

  format:check:
    desc: Check formatting without modifying files
    cmds:
      - task: format:backend:check
      - task: format:frontend:check

  format:backend:
    desc: Format backend code
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run ruff format .

  format:backend:check:
    desc: Check backend code formatting
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run ruff format . --check

  format:frontend:
    desc: Format frontend code
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - npm run format

  format:frontend:check:
    desc: Check frontend code formatting
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - npm run format:check

  type-check:
    desc: Type check all code (backend + frontend)
    cmds:
      - task: type-check:backend
      - task: type-check:frontend

  type-check:backend:
    desc: Type check backend code
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run ty check

  type-check:frontend:
    desc: Type check frontend code
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - npm run type-check
      - npm run check

  # ========================================
  # テスト
  # ========================================
  test:
    desc: Run default tests (backend + frontend unit, excludes workflow/performance)
    cmds:
      - task: test:backend
      - task: test:frontend

  test:backend:
    desc: Run backend tests
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run pytest -q

  test:frontend:
    desc: Run frontend unit tests (logic + component + integration)
    cmds:
      - task: test:frontend:unit

  test:frontend:logic:
    desc: Run frontend logic tests (Vitest)
    dir: "{{.FRONTEND_DIR}}"
    deps:
      - install:frontend
    cmds:
      - npm run test:logic

  test:frontend:component:
    desc: Run frontend component tests (Vitest)
    dir: "{{.FRONTEND_DIR}}"
    deps:
      - install:frontend
    cmds:
      - npm run test:component

  test:frontend:integration:
    desc: Run frontend integration tests (Vitest)
    dir: "{{.FRONTEND_DIR}}"
    deps:
      - install:frontend
    cmds:
      - npm run test:integration

  test:frontend:unit:
    desc: Run all frontend unit tests (logic + component + integration)
    dir: "{{.FRONTEND_DIR}}"
    deps:
      - install:frontend
    cmds:
      - npm run test:unit

  test:contract:
    desc: Run contract and boundary tests
    dir: "{{.BACKEND_DIR}}"
    deps:
      - install:backend
    cmds:
      - uv run pytest -q -m "contract and not perf"

  test:workflow:smoke:
    desc: Run lightweight replay workflow regression with the first bundled asset
    dir: "{{.FRONTEND_DIR}}"
    deps:
      - install:backend
      - install:frontend
    env:
      SPLAT_REPLAY_E2E_MODE: smoke
    cmds:
      - npm run test:e2e

  test:workflow:full:
    desc: Run full replay workflow regression with all bundled assets in clean-run mode
    dir: "{{.FRONTEND_DIR}}"
    deps:
      - install:backend
      - install:frontend
    env:
      CI: "1"
      SPLAT_REPLAY_E2E_MODE: full
    cmds:
      - npm run test:e2e

  test:performance:
    desc: Run performance regression tests
    dir: "{{.BACKEND_DIR}}"
    deps:
      - install:backend
    cmds:
      - uv run pytest -q -m perf

  test:release:
    desc: Run release-quality regression gate
    cmds:
      - task: verify
      - task: test:workflow:full

  test:release:performance:
    desc: Run release-quality regression gate including performance tests
    cmds:
      - task: verify
      - task: test:performance
      - task: test:workflow:full

  test:e2e:
    desc: Run frontend Playwright E2E tests with bundled replay assets
    cmds:
      - task: test:frontend:e2e

  test:e2e:headed:
    desc: Run frontend Playwright E2E tests with visible browser and bundled replay assets
    cmds:
      - task: test:frontend:e2e:headed

  test:frontend:e2e:
    desc: Run frontend Playwright E2E tests with bundled replay assets
    dir: "{{.FRONTEND_DIR}}"
    deps:
      - install:backend
      - install:frontend
    cmds:
      - npm run test:e2e

  test:frontend:e2e:headed:
    desc: Run frontend Playwright E2E tests with visible browser and bundled replay assets
    dir: "{{.FRONTEND_DIR}}"
    deps:
      - install:backend
      - install:frontend
    cmds:
      - npm run test:e2e -- --headed

  test:frontend:e2e:settings:
    desc: Run E2E settings persistence tests for bundled replay assets
    dir: "{{.FRONTEND_DIR}}"
    deps:
      - install:backend
      - install:frontend
    cmds:
      - npm run test:e2e -- tests/e2e/settings-persistence.spec.ts

  test:frontend:e2e:settings:headed:
    desc: Run E2E settings persistence tests with visible browser for bundled replay assets
    dir: "{{.FRONTEND_DIR}}"
    deps:
      - install:backend
      - install:frontend
    cmds:
      - npm run test:e2e -- --headed tests/e2e/settings-persistence.spec.ts

  test:frontend:e2e:auto-recording:
    desc: Run E2E auto recording workflow tests for bundled replay assets
    dir: "{{.FRONTEND_DIR}}"
    deps:
      - install:backend
      - install:frontend
    cmds:
      - npm run test:e2e -- tests/e2e/auto-recording-workflow.spec.ts

  test:frontend:e2e:auto-recording:headed:
    desc: Run E2E auto recording workflow tests with visible browser for bundled replay assets
    dir: "{{.FRONTEND_DIR}}"
    deps:
      - install:backend
      - install:frontend
    cmds:
      - npm run test:e2e -- --headed tests/e2e/auto-recording-workflow.spec.ts

  test:verbose:
    desc: Run all tests with verbose output
    cmds:
      - task: test:backend:verbose
      - task: test:frontend

  test:backend:verbose:
    desc: Run backend tests with verbose output
    dir: "{{.BACKEND_DIR}}"
    cmds:
      - uv run pytest -v

  # ========================================
  # Coverage (カバレッジ測定)
  # ========================================
  coverage:
    desc: Run coverage for all code (backend + frontend)
    cmds:
      - task: coverage:backend
      - task: coverage:frontend

  coverage:backend:
    desc: Run backend coverage measurement
    dir: "{{.BACKEND_DIR}}"
    deps:
      - install:backend
    cmds:
      - uv run pytest --cov=splat_replay --cov-report=term --cov-report=html tests/
      - cmd: 'powershell -NoProfile -Command "Write-Host ''''; Write-Host ''カバレッジレポート生成完了:'' -ForegroundColor Green; Write-Host ''  {{.BACKEND_DIR}}/htmlcov/index.html'' -ForegroundColor Yellow; Write-Host ''''"'

  coverage:frontend:
    desc: Run frontend coverage measurement
    dir: "{{.FRONTEND_DIR}}"
    deps:
      - install:frontend
    cmds:
      - npm run test:coverage
      - cmd: 'powershell -NoProfile -Command "Write-Host ''''; Write-Host ''カバレッジレポート生成完了:'' -ForegroundColor Green; Write-Host ''  {{.FRONTEND_DIR}}/coverage/index.html'' -ForegroundColor Yellow; Write-Host ''''"'

  coverage:report:
    desc: Open coverage reports in browser
    cmds:
      - cmd: 'powershell -NoProfile -Command "if (Test-Path ''{{.BACKEND_DIR}}/htmlcov/index.html'') { Start-Process ''{{.BACKEND_DIR}}/htmlcov/index.html'' } else { Write-Host ''Backend カバレッジレポートが見つかりません。task coverage:backend を実行してください。'' -ForegroundColor Yellow }"'
      - cmd: 'powershell -NoProfile -Command "if (Test-Path ''{{.FRONTEND_DIR}}/coverage/index.html'') { Start-Process ''{{.FRONTEND_DIR}}/coverage/index.html'' } else { Write-Host ''Frontend カバレッジレポートが見つかりません。task coverage:frontend を実行してください。'' -ForegroundColor Yellow }"'

  # ========================================
  # クリーンアップ
  # ========================================
  clean:
    desc: Clean all build artifacts
    cmds:
      - task: clean:dist
      - task: clean:frontend

  clean:dist:
    desc: Clean backend build artifacts (dist, build, spec artifacts)
    cmds:
      - cmd: powershell -NoProfile -Command "if (Test-Path '{{.DIST_ROOT}}') { Remove-Item -Recurse -Force '{{.DIST_ROOT}}' }"
        ignore_error: true
      - cmd: powershell -NoProfile -Command "if (Test-Path '{{.BUILD_DIR}}') { Remove-Item -Recurse -Force '{{.BUILD_DIR}}' }"
        ignore_error: true

  clean:frontend:
    desc: Clean frontend build artifacts
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - cmd: powershell -NoProfile -Command "if (Test-Path 'dist') { Remove-Item -Recurse -Force 'dist' }"
        ignore_error: true
      - cmd: powershell -NoProfile -Command "if (Test-Path 'node_modules') { Remove-Item -Recurse -Force 'node_modules' }"
        ignore_error: true

  clean:frontend:dist:
    desc: Clean frontend dist only (keep node_modules)
    dir: "{{.FRONTEND_DIR}}"
    cmds:
      - cmd: powershell -NoProfile -Command "if (Test-Path 'dist') { Remove-Item -Recurse -Force 'dist' }"
        ignore_error: true

  # ========================================
  # ツール
  # ========================================
  weapon-sync:dry-run:
    desc: Check missing weapon template definitions without updating YAML
    cmds:
      - "{{.VENV_PYTHON}} {{.WEAPON_TEMPLATE_SYNC_SCRIPT}} --dry-run"

  weapon-sync:
    desc: Sync weapon template definitions from assets to YAML
    cmds:
      - "{{.VENV_PYTHON}} {{.WEAPON_TEMPLATE_SYNC_SCRIPT}}"

  # ========================================
  # ユーティリティ
  # ========================================
  run:
    desc: Run the built executable
    cmds:
      - "{{.DIST_DIR}}\\SplatReplay.exe"

  help:
    desc: Show available tasks
    cmds:
      - task --list

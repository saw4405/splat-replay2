default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.6
    hooks:
      - id: ruff-check
        args: [--config, backend/pyproject.toml]
        files: ^backend/
        stages: [pre-commit]
      - id: ruff-format
        args: [--config, backend/pyproject.toml]
        files: ^backend/
        stages: [pre-commit]
  - repo: local
    hooks:
      - id: ty
        name: ty check
        entry: uv --directory backend run ty check . --ignore unresolved-import
        language: system
        files: ^backend/src/|^backend/tests/
        pass_filenames: false
        stages: [pre-commit]
      - id: frontend-format
        name: frontend format check
        entry: node frontend/scripts/run-pre-commit-frontend-tool.js prettier-check
        language: system
        files: ^frontend/
        stages: [pre-commit]
      - id: frontend-lint
        name: frontend lint
        entry: node frontend/scripts/run-pre-commit-frontend-tool.js eslint
        language: system
        files: ^frontend/
        stages: [pre-commit]
      - id: frontend-type-check
        name: frontend type check
        entry: npm run type-check --prefix frontend
        language: system
        files: ^frontend/
        pass_filenames: false
        stages: [pre-push]
      - id: frontend-svelte-check
        name: frontend svelte check
        entry: npm run check --prefix frontend
        language: system
        files: ^frontend/
        pass_filenames: false
        stages: [pre-push]
      - id: backend-import-lint
        name: backend import lint
        entry: uv --directory backend run lint-imports --no-cache
        language: system
        files: ^backend/
        pass_filenames: false
        stages: [pre-push]
